<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Pond Sandbox - Elite Edition</title>
    <style>
        :root {
            --ui-bg: rgba(255, 255, 255, 0.9);
            --accent: #3498db;
            --gold: #f1c40f;
        }

        body { 
            margin: 0; overflow: hidden; background: #000; 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            touch-action: none; -webkit-user-select: none;
        }
        
        canvas { display: block; }
        
        #stats {
            position: absolute; 
            top: calc(15px + env(safe-area-inset-top)); 
            right: 20px;
            background: rgba(0,0,0,0.7); color: var(--gold); padding: 10px 20px;
            border-radius: 20px; font-weight: bold; font-size: 18px; z-index: 20;
            border: 2px solid var(--gold); backdrop-filter: blur(5px); 
            display: flex; gap: 15px;
        }

        #toolbar {
            position: absolute; 
            bottom: calc(20px + env(safe-area-inset-bottom)); 
            left: 50%; transform: translateX(-50%);
            background: var(--ui-bg); padding: 10px; border-radius: 30px;
            display: flex; gap: 5px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            z-index: 10; backdrop-filter: blur(10px); width: 95%; max-width: 800px; 
            justify-content: space-around;
        }

        .tool {
            flex: 1; padding: 12px 2px; border-radius: 15px; border: 1px solid #ddd;
            background: #f8f8f8; font-weight: bold; font-size: 10px; cursor: pointer;
            display: flex; flex-direction: column; align-items: center; transition: 0.2s;
            -webkit-tap-highlight-color: transparent;
        }
        .tool.active { background: var(--accent); color: white; border-color: #2980b9; }
        .hunt-btn { background: #e67e22 !important; color: white !important; }
        .price-tag { font-size: 8px; color: #e67e22; margin-top: 1px; }
        .sub-text { font-size: 8px; opacity: 0.7; }

        #size-control {
            position: absolute; 
            bottom: calc(110px + env(safe-area-inset-bottom)); 
            left: 50%; transform: translateX(-50%);
            background: var(--ui-bg); padding: 10px 20px; border-radius: 20px;
            display: none; align-items: center; gap: 10px; z-index: 11; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

    <div id="stats">
        <span>💰 <span id="coin-count">50</span></span>
        <span>🍞 <span id="bread-stock">5</span></span>
    </div>

    <div id="size-control">
        <label style="font-size:12px; font-weight:bold; color:#333;">Size:</label>
        <input type="range" id="size-slider" min="0.1" max="3.0" step="0.05" value="1">
    </div>

    <div id="toolbar">
        <button class="tool active" id="select-btn" onclick="setTool('select')"><span>🎯 Select</span></button>
        <button class="tool" id="stone-btn" onclick="setTool('stone')">
            <span>🪨 Stone</span><span class="sub-text" id="stone-label">v1</span><span class="price-tag" id="stone-price">FREE</span>
        </button>
        <button class="tool" id="plant-btn" onclick="setTool('plant')">
            <span>🌿 Plant</span><span class="sub-text" id="plant-label">v1</span><span class="price-tag" id="plant-price">FREE</span>
        </button>
        <button class="tool" id="fish-btn" onclick="setTool('fish')">
            <span>🐟 Fish</span><span class="sub-text" id="fish-label">v1</span><span class="price-tag" id="fish-price">FREE</span>
        </button>
        <button class="tool" id="food-btn" onclick="setTool('food')"><span>🍞 Feed</span><span style="font-size:9px">Stock</span></button>
        <button class="tool hunt-btn" onclick="startMiniGame()"><span>🏹 Hunt</span><span style="font-size:9px">Get Food</span></button>
        <button class="tool" style="background:#e74c3c; color:white;" onclick="clearPond()"><span>🗑️</span></button>
    </div>

    <canvas id="pondCanvas"></canvas>

<script>
const canvas = document.getElementById('pondCanvas');
const ctx = canvas.getContext('2d');
const sizeSlider = document.getElementById('size-slider');
const sizeControl = document.getElementById('size-control');

// --- GAME STATE ---
let breadStock = parseInt(localStorage.getItem('pond_bread')) || 5;
document.getElementById('bread-stock').innerText = breadStock;

let coins = 50;
let currentTool = 'select';
let entities = [];
let floatingTexts = [];
let particles = []; 
let selectedEntity = null;
let isDragging = false;
let timeOfDay = 0;

const counts = { stone: 3, plant: 2, fish: 2 }; 
const assets = { bg: new Image(), stone: [], plant: [], fish: [] };
const selectedVariety = { stone: 0, plant: 0, fish: 0 };

// --- IMAGE LOADING LOGIC ---
assets.bg.src = 'static/images/bgperfect.jpg';

for (let type in counts) {
    for (let i = 1; i <= counts[type]; i++) {
        const img = new Image();
        img.src = `static/images/${type}${i}.png`; 
        assets[type].push(img);
    }
}

// --- FLASK NAVIGATION & PERSISTENCE ---
function startMiniGame() {
    localStorage.setItem('pond_bread', breadStock);
    window.location.href = "/hunt"; 
}

// Update bread count when returning from the hunt
window.addEventListener('focus', () => {
    breadStock = parseInt(localStorage.getItem('pond_bread')) || 0;
    document.getElementById('bread-stock').innerText = breadStock;
});

function clearPond() {
    entities = []; particles = []; floatingTexts = []; 
    sizeControl.style.display = 'none';
}

class Entity {
    constructor(x, y, type, varietyIndex) {
        this.x = x; this.y = y; this.type = type;
        this.variety = varietyIndex;
        this.img = (type !== 'dropping' && type !== 'egg') ? assets[type][varietyIndex] : null;
        this.dirX = Math.random() > 0.5 ? 1 : -1;
        
        if (type === 'fish') this.size = 0.12;
        else if (type === 'egg') this.size = 0.05;
        else this.size = 0.5; 

        this.timer = Math.random() * 100;
        this.hatchTimer = 0; 
        this.isHunting = false;
    }

    update() {
        if (selectedEntity === this && isDragging) return;
        this.timer += 0.04;
        
        if (this.type === 'egg') {
            this.hatchTimer++;
            if (this.hatchTimer > 1000) {
                this.type = 'fish';
                this.img = assets['fish'][this.variety];
                this.size = 0.12;
                coins += 20;
                document.getElementById('coin-count').innerText = coins;
                floatingTexts.push({ x: this.x, y: this.y, opacity: 1, text: "Hatched! +20 🪙", color: "#f1c40f" });
            }
            return;
        }

        if (this.type === 'fish') {
            let food = entities.find(e => e.type === 'dropping');
            if (food) {
                this.isHunting = true;
                let dx = food.x - this.x; let dy = food.y - this.y;
                let dist = Math.hypot(dx, dy);
                this.x += (dx/dist)*2.5; this.y += (dy/dist)*2.5;
                this.dirX = dx > 0 ? -1 : 1; 
                if (dist < 20) {
                    entities = entities.filter(e => e !== food);
                    this.size = Math.min(this.size + 0.02, 0.3);
                }
            } else {
                this.isHunting = false;
                this.x += this.dirX * 1.2;
                this.y += Math.sin(this.timer * 0.5) * 0.5;
                if (this.x < -50 || this.x > canvas.width + 50) this.dirX *= -1;
            }
        }

        if (this.type === 'dropping') {
            this.y += 1.5;
            if (this.y > canvas.height) entities = entities.filter(e => e !== this);
        }
    }

    draw() {
        ctx.save();
        ctx.translate(this.x, this.y);
        
        if (this.type === 'dropping') {
            ctx.fillStyle = "#e67e22";
            ctx.beginPath(); ctx.arc(0, 0, 5, 0, Math.PI*2); ctx.fill();
        } else if (this.type === 'egg') {
            ctx.fillStyle = "#fff";
            ctx.beginPath(); ctx.ellipse(0, 0, 5, 7, 0, 0, Math.PI*2); ctx.fill();
        } else if (this.img && this.img.complete) {
            if (this.type === 'fish') ctx.scale(-this.dirX, 1);
            if (this.type === 'plant') ctx.rotate(Math.sin(this.timer) * 0.05);

            const w = this.img.width * this.size;
            const h = this.img.height * this.size;

            if (selectedEntity === this) {
                ctx.shadowBlur = 15; ctx.shadowColor = "gold";
            }

            if (this.type === 'plant') ctx.drawImage(this.img, -w/2, -h, w, h);
            else ctx.drawImage(this.img, -w/2, -h/2, w, h);
        }
        ctx.restore();
    }
}

function setTool(tool) {
    if (currentTool === tool && counts[tool]) {
        selectedVariety[tool] = (selectedVariety[tool] + 1) % counts[tool];
        document.getElementById(`${tool}-label`).innerText = `v${selectedVariety[tool] + 1}`;
        let price = selectedVariety[tool] * 10;
        document.getElementById(`${tool}-price`).innerText = price === 0 ? "FREE" : "🪙 " + price;
    }
    currentTool = tool;
    document.querySelectorAll('.tool').forEach(btn => btn.classList.remove('active'));
    document.getElementById(`${tool}-btn`)?.classList.add('active');
    if (tool !== 'select') { sizeControl.style.display = 'none'; selectedEntity = null; }
}

function handleStart(x, y) {
    const clicked = [...entities].reverse().find(ent => {
        if (ent.type === 'dropping' || ent.type === 'egg') return false;
        return Math.hypot(ent.x - x, ent.y - y) < 40;
    });

    if (currentTool === 'select') {
        selectedEntity = clicked || null;
        if (clicked) { 
            isDragging = true; 
            sizeControl.style.display = 'flex'; 
            sizeSlider.value = clicked.size; 
        } else {
            sizeControl.style.display = 'none';
        }
    } else if (currentTool === 'food') {
        if (breadStock > 0) {
            breadStock--; 
            document.getElementById('bread-stock').innerText = breadStock;
            localStorage.setItem('pond_bread', breadStock); 
            entities.push(new Entity(x, y, 'dropping', 0));
        }
    } else {
        const price = selectedVariety[currentTool] * 10;
        if (coins >= price) {
            coins -= price; 
            document.getElementById('coin-count').innerText = coins;
            entities.push(new Entity(x, y, currentTool, selectedVariety[currentTool]));
        }
    }
}

canvas.addEventListener('mousedown', e => handleStart(e.clientX, e.clientY));
canvas.addEventListener('touchstart', e => { e.preventDefault(); handleStart(e.touches[0].clientX, e.touches[0].clientY); }, {passive: false});
window.addEventListener('mousemove', e => { if (isDragging && selectedEntity) { selectedEntity.x = e.clientX; selectedEntity.y = e.clientY; }});
window.addEventListener('touchmove', e => { if (isDragging && selectedEntity) { selectedEntity.x = e.touches[0].clientX; selectedEntity.y = e.touches[0].clientY; }}, {passive: false});
window.addEventListener('mouseup', () => isDragging = false);
window.addEventListener('touchend', () => isDragging = false);
sizeSlider.oninput = () => { if (selectedEntity) selectedEntity.size = parseFloat(sizeSlider.value); };

function animate() {
    canvas.width = window.innerWidth; 
    canvas.height = window.innerHeight;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    if (assets.bg.complete) ctx.drawImage(assets.bg, 0, 0, canvas.width, canvas.height);
    
    entities.forEach(e => { e.update(); e.draw(); });

    floatingTexts.forEach((ft, i) => {
        ft.y -= 1; ft.opacity -= 0.02;
        ctx.globalAlpha = ft.opacity;
        ctx.fillStyle = ft.color;
        ctx.font = "bold 16px Arial";
        ctx.fillText(ft.text, ft.x, ft.y);
        if (ft.opacity <= 0) floatingTexts.splice(i, 1);
    });
    ctx.globalAlpha = 1.0;

    timeOfDay += 0.0002;
    let night = (Math.sin(timeOfDay * Math.PI * 2) * 0.5 + 0.5) * 0.6;
    ctx.fillStyle = `rgba(10, 10, 40, ${night})`;
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    requestAnimationFrame(animate);
}
animate();
</script>
</body>
</html>
