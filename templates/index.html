<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Pond Sandbox - Flask Edition</title>
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            background: #000; 
            font-family: 'Segoe UI', sans-serif; 
            touch-action: none;
            -webkit-user-select: none;
        }
        canvas { display: block; touch-action: none; }
        
        #stats {
            position: absolute; 
            top: calc(15px + env(safe-area-inset-top)); 
            right: 20px;
            background: rgba(0,0,0,0.6); color: #f1c40f; padding: 10px 20px;
            border-radius: 20px; font-weight: bold; font-size: 18px; z-index: 20;
            border: 2px solid #f1c40f; backdrop-filter: blur(5px); display: flex; gap: 15px;
            box-shadow: 0 0 15px rgba(241, 196, 15, 0.3);
        }

        #toolbar {
            position: absolute; 
            bottom: calc(20px + env(safe-area-inset-bottom)); 
            left: 50%; transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.9); padding: 10px; border-radius: 30px;
            display: flex; gap: 5px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            z-index: 10; backdrop-filter: blur(10px); width: 95%; max-width: 800px; justify-content: space-around;
        }

        .tool {
            flex: 1; padding: 12px 2px; border-radius: 15px; border: 1px solid #ddd;
            background: #f8f8f8; font-weight: bold; font-size: 10px; cursor: pointer;
            display: flex; flex-direction: column; align-items: center; transition: 0.2s;
            -webkit-tap-highlight-color: transparent;
        }
        .tool.active { background: #3498db; color: white; border-color: #2980b9; }
        .hunt-btn { background: #e67e22 !important; color: white !important; }
        .price-tag { font-size: 8px; color: #e67e22; margin-top: 1px; }
        .sub-text { font-size: 8px; opacity: 0.7; }

        #size-control {
            position: absolute; 
            bottom: calc(100px + env(safe-area-inset-bottom)); 
            left: 50%; transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.9); padding: 10px 20px; border-radius: 20px;
            display: none; align-items: center; gap: 10px; z-index: 11; box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

    <div id="stats">
        <span>💰 <span id="coin-count">50</span></span>
        <span>🍞 <span id="bread-stock">5</span></span>
    </div>

    <div id="size-control">
        <label style="font-size:12px; font-weight:bold; color:#333;">Size:</label>
        <input type="range" id="size-slider" min="0.2" max="4.0" step="0.05" value="1">
    </div>

    <div id="toolbar">
        <button class="tool active" id="select-btn" onclick="setTool('select')"><span>🎯 Select</span></button>
        <button class="tool" id="stone-btn" onclick="setTool('stone')">
            <span>🪨 Stone</span><span class="sub-text" id="stone-label">v1</span><span class="price-tag" id="stone-price">FREE</span>
        </button>
        <button class="tool" id="plant-btn" onclick="setTool('plant')">
            <span>🌿 Plant</span><span class="sub-text" id="plant-label">v1</span><span class="price-tag" id="plant-price">FREE</span>
        </button>
        <button class="tool" id="fish-btn" onclick="setTool('fish')">
            <span>🐟 Fish</span><span class="sub-text" id="fish-label">v1</span><span class="price-tag" id="fish-price">FREE</span>
        </button>
        <button class="tool" id="food-btn" onclick="setTool('food')"><span>🍞 Feed</span><span style="font-size:9px">Stock</span></button>
        <button class="tool hunt-btn" onclick="startMiniGame()"><span>🏹 Hunt</span><span style="font-size:9px">Get Food</span></button>
        <button class="tool" style="background:#e74c3c; color:white;" onclick="entities=[]; particles=[]; floatingTexts=[]; sizeControl.style.display='none';"><span>🗑️</span></button>
    </div>

    <canvas id="pondCanvas"></canvas>

<script>
const canvas = document.getElementById('pondCanvas');
const ctx = canvas.getContext('2d');
const sizeSlider = document.getElementById('size-slider');
const sizeControl = document.getElementById('size-control');

let breadStock = parseInt(localStorage.getItem('pond_bread')) || 5;
document.getElementById('bread-stock').innerText = breadStock;

let coins = 50;
let currentTool = 'select';
let entities = [];
let floatingTexts = [];
let particles = []; 
let selectedEntity = null;
let isDragging = false;
let timeOfDay = 0;

const counts = { stone: 3, plant: 2, fish: 2 }; 
const assets = { bg: new Image(), stone: [], plant: [], fish: [] };
const selectedVariety = { stone: 0, plant: 0, fish: 0 };

// --- FLASK IMAGE LOADING ---
assets.bg.src = "{{ url_for('static', filename='images/bgperfect.jpg') }}";
for (let type in counts) {
    for (let i = 1; i <= counts[type]; i++) {
        const img = new Image();
        // Generates the correct path for Flask
        img.src = `/static/images/${type}${i}.png`; 
        assets[type].push(img);
    }
}

function startMiniGame() {
    localStorage.setItem('pond_bread', breadStock);
    window.location.href = 'game.html';
}

function createGoodbyeEffect(x, y) {
    floatingTexts.push({ x: x, y: y, opacity: 1, text: "Goodbye! 👋", color: "#3498db" });
    for(let i=0; i<15; i++) {
        particles.push({
            x: x, y: y,
            vx: (Math.random() - 0.5) * 4,
            vy: (Math.random() - 0.5) * 4,
            life: 1.0,
            size: Math.random() * 3 + 1,
            color: Math.random() > 0.5 ? "#fff" : "#3498db"
        });
    }
}

class Entity {
    constructor(x, y, type, varietyIndex) {
        this.x = x; this.y = y; this.type = type;
        this.variety = varietyIndex;
        this.img = (type !== 'dropping' && type !== 'egg') ? assets[type][varietyIndex] : null;
        this.dirX = Math.random() > 0.5 ? 1 : -1;
        this.size = (type === 'fish') ? 0.08 : (type === 'egg' ? 0.05 : 0.8);
        this.timer = Math.random() * 100;
        this.hatchTimer = 0; 
        this.breedCooldown = 0; 
        this.isHunting = false;
        this.foodsEaten = 0;
    }

    update() {
        if (selectedEntity === this && isDragging) return;
        this.timer += 0.04;
        
        if (this.type === 'egg') {
            this.hatchTimer += 1;
            if (this.hatchTimer > 18000) {
                this.type = 'fish';
                this.img = assets['fish'][this.variety];
                this.size = 0.08;
                this.hatchTimer = 0;
                coins += 20;
                document.getElementById('coin-count').innerText = coins;
                floatingTexts.push({ x: this.x, y: this.y, opacity: 1, text: "+20 🪙", color: "#f1c40f" });
            }
            return;
        }

        if (this.type === 'fish') {
            if (this.breedCooldown > 0) this.breedCooldown--;

            let food = entities.find(e => e.type === 'dropping');
            if (food) {
                this.isHunting = true;
                let dx = food.x - this.x; let dy = food.y - this.y;
                let dist = Math.hypot(dx, dy);
                this.x += (dx/dist)*2.5; this.y += (dy/dist)*2.5;
                this.dirX = dx > 0 ? -1 : 1; 

                if (dist < 30) {
                    entities = entities.filter(e => e !== food);
                    this.foodsEaten++;
                    if (this.foodsEaten >= 1) { 
                        this.size = 0.15; 
                    }
                }
            } else {
                this.isHunting = false;
                this.x += this.dirX * 1.2;
                this.y += Math.sin(this.timer * 0.5) * 0.3;
                
                if (this.size >= 0.15 && this.breedCooldown <= 0) {
                    let partner = entities.find(e => 
                        e !== this && 
                        e.type === 'fish' && 
                        e.variety === this.variety && 
                        e.size >= 0.15 && 
                        e.breedCooldown <= 0 &&
                        Math.hypot(e.x - this.x, e.y - this.y) < 40
                    );
                    if (partner) {
                        entities.push(new Entity(this.x, this.y, 'egg', this.variety));
                        createGoodbyeEffect(this.x, this.y);
                        createGoodbyeEffect(partner.x, partner.y);
                        entities = entities.filter(e => e !== this && e !== partner);
                        if (selectedEntity === this || selectedEntity === partner) {
                            selectedEntity = null;
                            sizeControl.style.display = 'none';
                        }
                    }
                }

                if (this.x < -100) this.x = canvas.width + 100;
                if (this.x > canvas.width + 100) this.x = -100;
            }
        }
        if (this.type === 'dropping') {
            this.y += 1.2;
            if (this.y > canvas.height) entities = entities.filter(e => e !== this);
        }
    }

    draw() {
        ctx.save();
        ctx.translate(this.x, this.y);
        
        if (this.type === 'dropping') {
            ctx.fillStyle = "#d35400";
            ctx.beginPath(); ctx.arc(0, 0, 4, 0, Math.PI * 2); ctx.fill();
        } else if (this.type === 'egg') {
            ctx.fillStyle = "#fffbe0";
            ctx.shadowBlur = 10; ctx.shadowColor = "white";
            ctx.beginPath(); ctx.ellipse(0, 0, 6, 8, 0, 0, Math.PI * 2); ctx.fill();
        } else if (this.img && this.img.complete) {
            if (this.type === 'plant') ctx.rotate(Math.sin(this.timer) * 0.08);

            if (selectedEntity === this && currentTool === 'select') {
                ctx.beginPath(); 
                let ringY = this.type === 'plant' ? - (this.img.height * this.size) / 2 : 0;
                ctx.arc(0, ringY, (this.img.width * this.size) / 1.8 + 10, 0, Math.PI * 2);
                ctx.strokeStyle = "#f1c40f"; ctx.lineWidth = 3; ctx.stroke();
            }

            if (this.type === 'fish') {
                let visualFlip = this.isHunting ? this.dirX : -this.dirX;
                ctx.scale(visualFlip, 1);
            }
            
            const w = this.img.width * this.size;
            const h = this.img.height * this.size;
            if (this.type === 'plant') ctx.drawImage(this.img, -w/2, -h, w, h);
            else ctx.drawImage(this.img, -w/2, -h/2, w, h);
        }
        ctx.restore();
    }
}

function setTool(tool) {
    if (currentTool === tool && counts[tool]) {
        selectedVariety[tool] = (selectedVariety[tool] + 1) % counts[tool];
        document.getElementById(`${tool}-label`).innerText = `v${selectedVariety[tool] + 1}`;
        const price = selectedVariety[tool] * 10;
        document.getElementById(`${tool}-price`).innerText = price === 0 ? "FREE" : "🪙 " + price;
    }
    currentTool = tool;
    document.querySelectorAll('.tool').forEach(btn => btn.classList.remove('active'));
    document.getElementById(`${tool}-btn`)?.classList.add('active');
    if (tool !== 'select') { sizeControl.style.display = 'none'; selectedEntity = null; }
}

function handleStart(x, y) {
    const clicked = [...entities].reverse().find(ent => {
        if (ent.type === 'dropping' || ent.type === 'egg') return false;
        let dy = ent.type === 'plant' ? (ent.y - ent.img.height * ent.size/2) : ent.y;
        return Math.hypot(ent.x - x, dy - y) < Math.max((ent.img.width * ent.size) / 1.5, 30);
    });

    if (currentTool === 'select') {
        selectedEntity = clicked || null;
        if (clicked) { isDragging = true; sizeControl.style.display = 'block'; sizeSlider.value = clicked.size; }
        else sizeControl.style.display = 'none';
    } else if (currentTool === 'food') {
        if (breadStock > 0) {
            breadStock--; 
            document.getElementById('bread-stock').innerText = breadStock;
            localStorage.setItem('pond_bread', breadStock); 
            entities.push(new Entity(x, y, 'dropping', 0));
        }
    } else {
        const price = selectedVariety[currentTool] * 10 || 0;
        if (coins >= price) {
            coins -= price; document.getElementById('coin-count').innerText = coins;
            entities.push(new Entity(x, y, currentTool, selectedVariety[currentTool]));
        }
    }
}

canvas.addEventListener('mousedown', (e) => handleStart(e.clientX, e.clientY));
window.addEventListener('mousemove', (e) => { if (isDragging && selectedEntity) { selectedEntity.x = e.clientX; selectedEntity.y = e.clientY; }});
window.addEventListener('mouseup', () => isDragging = false);

canvas.addEventListener('touchstart', (e) => {
    e.preventDefault(); 
    const touch = e.touches[0];
    handleStart(touch.clientX, touch.clientY);
}, { passive: false });

window.addEventListener('touchmove', (e) => {
    if (isDragging && selectedEntity) {
        e.preventDefault();
        const touch = e.touches[0];
        selectedEntity.x = touch.clientX;
        selectedEntity.y = touch.clientY;
    }
}, { passive: false });

window.addEventListener('touchend', () => isDragging = false);

sizeSlider.oninput = () => { if (selectedEntity) selectedEntity.size = parseFloat(sizeSlider.value); };

function animate() {
    if (canvas.width !== window.innerWidth || canvas.height !== window.innerHeight) {
        canvas.width = window.innerWidth; 
        canvas.height = window.innerHeight;
    }

    ctx.clearRect(0,0,canvas.width, canvas.height);
    if (assets.bg.complete) ctx.drawImage(assets.bg, 0, 0, canvas.width, canvas.height);
    
    entities.sort((a,b) => (a.type==='fish'?1:0) - (b.type==='fish'?1:0));
    entities.forEach(e => { e.update(); e.draw(); });

    particles.forEach((p, i) => {
        p.x += p.vx; p.y += p.vy;
        p.life -= 0.02;
        ctx.fillStyle = p.color;
        ctx.globalAlpha = p.life;
        ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill();
        ctx.globalAlpha = 1.0;
        if(p.life <= 0) particles.splice(i, 1);
    });

    floatingTexts.forEach((ft, i) => {
        ft.y -= 1; 
        ft.opacity -= 0.01;
        ctx.fillStyle = ft.color || "#f1c40f";
        ctx.globalAlpha = ft.opacity;
        ctx.font = "bold 20px Arial";
        ctx.fillText(ft.text, ft.x, ft.y);
        ctx.globalAlpha = 1.0;
        if (ft.opacity <= 0) floatingTexts.splice(i, 1);
    });

    timeOfDay += 0.0005; 
    if (timeOfDay > 1) timeOfDay = 0;
    let cycle = Math.sin(timeOfDay * Math.PI * 2); 
    let darkness = cycle * 0.5 + 0.5; 
    ctx.save();
    ctx.fillStyle = `rgba(15, 15, 50, ${darkness * 0.7})`; 
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.restore();

    requestAnimationFrame(animate);
}
animate();
</script>
</body>
</html>
